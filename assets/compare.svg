<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <rect width="600" height="280" rx="16" fill="#12121a"/>

  <!-- Fugu side -->
  <rect x="30" y="30" width="250" height="220" rx="12" fill="#1a1a24" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="155" y="60" text-anchor="middle" fill="#9090a0" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="700">Sakana Fugu</text>
  <text x="155" y="80" text-anchor="middle" fill="#6b6b80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">Proprietary · Cloud-only</text>

  <rect x="50" y="100" width="210" height="28" rx="6" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="155" y="119" text-anchor="middle" fill="#f87171" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">$5-30 / M tokens</text>

  <rect x="50" y="138" width="210" height="28" rx="6" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="155" y="157" text-anchor="middle" fill="#f87171" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">Black box routing</text>

  <rect x="50" y="176" width="210" height="28" rx="6" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="155" y="195" text-anchor="middle" fill="#f87171" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">Fixed model pool</text>

  <rect x="50" y="214" width="210" height="28" rx="6" fill="#12121a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="155" y="233" text-anchor="middle" fill="#f87171" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">No feedback loop</text>

  <!-- VS -->
  <circle cx="300" cy="140" r="24" fill="#1a1a24" stroke="#2a2a3a" stroke-width="2"/>
  <text x="300" y="146" text-anchor="middle" fill="#e0e0e8" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="800">VS</text>

  <!-- Fugusashi side -->
  <rect x="320" y="30" width="250" height="220" rx="12" fill="#1a1a24" stroke="url(#redGrad)" stroke-width="2"/>
  <text x="445" y="60" text-anchor="middle" fill="url(#redGrad)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="700">Fugusashi</text>
  <text x="445" y="80" text-anchor="middle" fill="#4ade80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11">Open source · Self-hosted</text>

  <rect x="340" y="100" width="210" height="28" rx="6" fill="#12121a" stroke="#4ade80" stroke-width="1"/>
  <text x="445" y="119" text-anchor="middle" fill="#4ade80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">Free · pay only for APIs</text>

  <rect x="340" y="138" width="210" height="28" rx="6" fill="#12121a" stroke="#4ade80" stroke-width="1"/>
  <text x="445" y="157" text-anchor="middle" fill="#4ade80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">Every decision visible</text>

  <rect x="340" y="176" width="210" height="28" rx="6" fill="#12121a" stroke="#4ade80" stroke-width="1"/>
  <text x="445" y="195" text-anchor="middle" fill="#4ade80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">You control the models</text>

  <rect x="340" y="214" width="210" height="28" rx="6" fill="#12121a" stroke="#4ade80" stroke-width="1"/>
  <text x="445" y="233" text-anchor="middle" fill="#4ade80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">Learns from every request</text>
</svg>
