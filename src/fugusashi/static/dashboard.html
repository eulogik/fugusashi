<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fugusashi Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f14; color: #e0e0e0; min-height: 100vh; }
.header { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 600; color: #fff; }
.header .version { font-size: 12px; color: #666; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; padding: 24px; }
.card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px; padding: 20px; }
.card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 16px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a3a; }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: #999; font-size: 14px; }
.stat-value { font-size: 18px; font-weight: 600; color: #fff; }
.bar-chart { margin-top: 12px; }
.bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
.bar-label { width: 120px; font-size: 12px; color: #999; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 20px; background: #2a2a3a; border-radius: 4px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.bar-count { width: 30px; font-size: 12px; color: #ccc; text-align: right; }
.log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.log-table th { text-align: left; padding: 8px; color: #666; font-weight: 500; border-bottom: 1px solid #2a2a3a; font-size: 11px; text-transform: uppercase; }
.log-table td { padding: 8px; border-bottom: 1px solid #1f1f2a; }
.log-table tr:hover { background: #1f1f2a; }
.model-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.strategy-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #2a2a3a; color: #aaa; }
.confidence-high { color: #4ade80; }
.confidence-mid { color: #fbbf24; }
.confidence-low { color: #f87171; }
.pie-container { display: flex; align-items: center; gap: 20px; margin-top: 12px; }
.pie-legend { flex: 1; }
.pie-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.pie-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.refresh-btn { background: #2a2a3a; border: 1px solid #3a3a4a; color: #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.refresh-btn:hover { background: #3a3a4a; }
.empty-state { text-align: center; color: #555; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>Fugusashi</h1>
        <span class="version">Intelligent Model Router</span>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">Refresh</button>
</div>

<div class="grid">
    <div class="card">
        <h2>Overview</h2>
        <div class="stat-row">
            <span class="stat-label">Total Requests</span>
            <span class="stat-value" id="total-requests">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Total Tokens</span>
            <span class="stat-value" id="total-tokens">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Total Cost</span>
            <span class="stat-value" id="total-cost">$0.00</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Avg Routing Latency</span>
            <span class="stat-value" id="avg-latency">0ms</span>
        </div>
    </div>

    <div class="card">
        <h2>Model Usage</h2>
        <div id="model-usage" class="bar-chart"></div>
    </div>

    <div class="card">
        <h2>Strategy Distribution</h2>
        <div id="strategy-dist" class="bar-chart"></div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
        <h2>Recent Routing Decisions</h2>
        <table class="log-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Prompt</th>
                    <th>Routed To</th>
                    <th>Confidence</th>
                    <th>Strategy</th>
                </tr>
            </thead>
            <tbody id="decision-log">
            </tbody>
        </table>
        <div id="empty-log" class="empty-state" style="display:none;">No routing decisions yet. Send some requests to see them here.</div>
    </div>
</div>

<script>
const COLORS = ['#6366f1', '#8b5cf6', '#a78bfa', '#c4b5fd', '#14b8a6', '#f59e0b', '#ef4444', '#3b82f6'];

let refreshInterval;

async function fetchStats() {
    const r = await fetch('/v1/stats');
    return r.json();
}

async function fetchDecisions() {
    const r = await fetch('/v1/routing/decisions?limit=20');
    return r.json();
}

function confClass(c) {
    if (c >= 0.7) return 'confidence-high';
    if (c >= 0.4) return 'confidence-mid';
    return 'confidence-low';
}

function renderBarChart(containerId, data) {
    const container = document.getElementById(containerId);
    if (!data || Object.keys(data).length === 0) {
        container.innerHTML = '<div class="empty-state">No data yet</div>';
        return;
    }
    const max = Math.max(...Object.values(data));
    let html = '';
    let i = 0;
    for (const [label, count] of Object.entries(data)) {
        const pct = max > 0 ? (count / max) * 100 : 0;
        const color = COLORS[i % COLORS.length];
        html += `<div class="bar-row">
            <span class="bar-label" title="${label}">${label}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="bar-count">${count}</span>
        </div>`;
        i++;
    }
    container.innerHTML = html;
}

function renderDecisions(data) {
    const tbody = document.getElementById('decision-log');
    const empty = document.getElementById('empty-log');
    if (!data || data.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    let html = '';
    const sorted = [...data].reverse();
    for (const d of sorted) {
        const time = d.timestamp ? d.timestamp.split('T')[1]?.substring(0, 8) : '';
        const conf = d.confidence != null ? d.confidence.toFixed(2) : '';
        html += `<tr>
            <td style="color:#666;font-size:12px">${time}</td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.prompt_preview || ''}">${d.prompt_preview || ''}</td>
            <td><span class="model-tag" style="background:#2a2a3a">${d.routed_to || '-'}</span></td>
            <td class="${confClass(d.confidence)}">${conf}</td>
            <td><span class="strategy-tag">${d.strategy || '-'}</span></td>
        </tr>`;
    }
    tbody.innerHTML = html;
}

async function refreshAll() {
    try {
        const [stats, decisions] = await Promise.all([fetchStats(), fetchDecisions()]);

        document.getElementById('total-requests').textContent = stats.total_requests || 0;
        document.getElementById('total-tokens').textContent = (stats.total_tokens || 0).toLocaleString();
        document.getElementById('total-cost').textContent = '$' + (stats.total_cost || 0).toFixed(4);

        const routes = stats.recent_routes || [];
        const totalLat = routes.reduce((s, r) => s + (r.latency_ms || 0), 0);
        const avgLat = routes.length > 0 ? (totalLat / routes.length).toFixed(1) : '0';
        document.getElementById('avg-latency').textContent = avgLat + 'ms';

        const modelDist = {};
        if (stats.per_model) {
            for (const [m, s] of Object.entries(stats.per_model)) {
                modelDist[m] = s.calls;
            }
        }
        renderBarChart('model-usage', modelDist);

        const stratDist = {};
        for (const r of routes) {
            const s = r.strategy || 'unknown';
            stratDist[s] = (stratDist[s] || 0) + 1;
        }
        renderBarChart('strategy-dist', stratDist);

        renderDecisions(decisions.data);
    } catch (e) {
        console.error('Refresh failed:', e);
    }
}

refreshAll();
refreshInterval = setInterval(refreshAll, 3000);
</script>
</body>
</html>
